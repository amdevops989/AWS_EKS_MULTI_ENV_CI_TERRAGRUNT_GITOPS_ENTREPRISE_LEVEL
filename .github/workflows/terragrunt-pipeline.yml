name: Multi-Env Infrastructure Pipeline

on:
  push:
    branches:
      - dev
      - prod
    paths:
      - 'Infra_AWS/**'
      - '.github/workflows/terragrunt-pipeline.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'dev' && 'development' || 'production' }}
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial: Terragrunt needs full history to run a precise git diff

      - name: Setup OpenTofu/Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 0.58.3 # Pin an exact version instead of 'latest'

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Terragrunt native dependency tracking execution
      - name: Terragrunt Prepare & Plan (Git-Based Filtering)
        run: |
          cd Infra_AWS/live/${{ github.ref_name }}
          
          # ---------------------------------------------------
          # 1. PREPARE: Detect changes and build filters-file.txt
          # ---------------------------------------------------
          echo "Detecting Git changes..."
          git diff --name-only HEAD^ HEAD > raw_diff.txt
          
          if [ ! -s raw_diff.txt ]; then
            echo "No changes detected."
            exit 0
          fi
          
          # If core modules or root files changed, we must evaluate the whole environment
          if grep -qE "modules/|env.hcl|root.hcl" raw_diff.txt; then
            echo "Core files modified. We will evaluate all live units in this environment."
            # Find all terragrunt.hcl files in the current environment and add their dirs to the filter
            find . -type f -name "terragrunt.hcl" -exec dirname {} \; | sed 's|^\./||' > filters-file.txt
          else
            # Otherwise, only evaluate the specific live directories that changed
            grep -E "^Infra_AWS/live/${{ github.ref_name }}/" raw_diff.txt | sed "s|^Infra_AWS/live/${{ github.ref_name }}/||" | cut -d'/' -f1 | sort -u > filters-file.txt
          fi
          
          echo "--- Filters File Created ---"
          cat filters-file.txt
          
          # ---------------------------------------------------
          # 2. PLAN: Run isolated plans and silence the massive stdout
          # ---------------------------------------------------
          echo "Executing targeted plans..."
          
          # Use Terragrunt's native filter argument and write plan outputs to files instead of crashing the console
          terragrunt run-all plan \
            --terragrunt-ignore-external-dependencies \
            --terragrunt-non-interactive \
            -compact-warnings \
            -out=tfplan.binary | tee plan_summary.log
            
          # Scan the clean log to ensure no hard errors occurred during the silent plan
          if grep -q "Error:" plan_summary.log; then
            echo "A Terraform validation error occurred. Check the summary log."
            exit 1
          fi