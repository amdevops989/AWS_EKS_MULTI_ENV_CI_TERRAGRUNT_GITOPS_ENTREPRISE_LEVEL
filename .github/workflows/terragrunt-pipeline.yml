name: Multi-Env Infrastructure Pipeline

on:
  push:
    branches:
      - dev
      - prod
    paths:
      - 'Infra_AWS/**'
      - '.github/workflows/terragrunt-pipeline.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'dev' && 'development' || 'production' }}
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial: Terragrunt needs full history to run a precise git diff

      - name: Setup OpenTofu/Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: 0.58.3 # Pin an exact version instead of 'latest'

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Terragrunt native dependency tracking execution
      - name: Terragrunt Smart Run
        run: |
          cd Infra_AWS/live/${{ github.ref_name }}
          
          echo "Determining changed modules dynamically..."
          # Get files changed between current commit and its parent
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | tr '\n' ',' | sed 's/,$//')
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected in Git."
            exit 0
          fi
          
          echo "Files changed: $CHANGED_FILES"
          
          # IF core modules, shared env configs, or root files change, plan everything in the environment.
          if echo "$CHANGED_FILES" | grep -E "modules/|env.hcl|root.hcl" > /dev/null; then
            echo "Core infrastructure files or modules modified. Processing entire environment stack..."
            terragrunt run-all plan --terragrunt-non-interactive
          else
            # Otherwise, target only the specific live sub-folders that explicitly matched the diff
            echo "Targeting specific live modules matching: $CHANGED_FILES"
            terragrunt run-all plan \
              --terragrunt-modules-that-include=$CHANGED_FILES \
              --terragrunt-non-interactive
          fi